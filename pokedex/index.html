<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Pokédex</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            padding: 40px;
        }

        .project {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            text-align: center;
        }

        input {
            padding: 8px;
            width: 60%;
        }

        button {
            padding: 8px 14px;
            margin-left: 5px;
            cursor: pointer;
        }

        .pokedex-card {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background: #f8fafc;
        }

        .pokedex-card img {
            width: 150px;
        }

        .type-badge {
            display: inline-block;
            padding: 6px 10px;
            margin: 5px;
            border-radius: 20px;
            background: #e0e7ff;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="project">
    <h3>Mini Pokédex</h3>

    <input type="text" id="pokemonInput" placeholder="Ej: pikachu" />
    <button onclick="searchPokemon()">Buscar</button>

    <div id="pokedexCard" class="pokedex-card"></div>
</div>

<script>
async function searchPokemon() {
    const name = document.getElementById("pokemonInput").value.toLowerCase();
    const card = document.getElementById("pokedexCard");

    if (!name) {
        card.innerHTML = "<p>Por favor ingresá un nombre.</p>";
        return;
    }

    try {
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);

        if (!response.ok) {
            throw new Error("No encontrado");
        }

        const data = await response.json();

        const types = data.types.map(t =>
            `<span class="type-badge">${t.type.name}</span>`
        ).join("");

        card.innerHTML = `
            <h2>#${data.id} - ${data.name.toUpperCase()}</h2>
            <img src="${data.sprites.other['official-artwork'].front_default}" />
            <p><strong>Altura:</strong> ${data.height}</p>
            <p><strong>Peso:</strong> ${data.weight}</p>
            <div>${types}</div>
        `;

    } catch (error) {
        card.innerHTML = "<p>Pokémon no encontrado 😢</p>";
    }
}
</script>

</body>
</html>
